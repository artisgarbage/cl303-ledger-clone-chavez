name: Deploy

on:
  push:
    branches:
      - main # auto-deploy to dev
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, prod]

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

env:
  PROJECT_ID: codelab303-ledger
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/codelab303-ledger/ledger-app
  IMAGE: us-central1-docker.pkg.dev/codelab303-ledger/ledger-app/margot-app
  # Cloud Run service names (Terraform: "${service_name}-${env}")
  CR_SERVICE_DEV: margot-app-dev
  CR_SERVICE_PROD: margot-app-prod
  SQL_CONN_DEV: codelab303-ledger:us-central1:ledger-postgres-dev
  SQL_CONN_PROD: codelab303-ledger:us-central1:ledger-postgres-prod

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Guard: fail fast if setup_data is present in the build context
  # ──────────────────────────────────────────────────────────────────────────
  security-check:
    name: Security pre-flight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if setup_data exists in tree
        run: |
          if git ls-files setup_data/ | grep -q .; then
            echo "::error::setup_data/ contains tracked files — run history purge first!"
            exit 1
          fi

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # Test
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: security-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Run tests
        run: npm test -- --reporter=verbose
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

  # ──────────────────────────────────────────────────────────────────────────
  # Build & push image
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build & push
    runs-on: ubuntu-latest
    needs: [security-check, test]
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify setup_data not in build context
        run: |
          if [ -d setup_data ]; then
            echo "::error::setup_data directory must not exist at build time"
            exit 1
          fi

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/$(gcloud projects describe ${{ env.PROJECT_ID }} --format='value(projectNumber)')/locations/global/workloadIdentityPools/github-actions/providers/github"
          service_account: "ledger-ci@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            --platform linux/amd64 \
            --tag "${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}" \
            --tag "${{ env.IMAGE }}:latest-${{ github.ref_name }}" \
            .

      - name: Verify setup_data NOT in image
        run: |
          docker run --rm "${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}" \
            sh -c 'ls -la /app/setup_data 2>&1 && exit 1 || exit 0'

      - name: Push image
        run: |
          docker push "${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}"
          docker push "${{ env.IMAGE }}:latest-${{ github.ref_name }}"

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy to dev (auto on push to main)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy → dev
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/$(gcloud projects describe ${{ env.PROJECT_ID }} --format='value(projectNumber)')/locations/global/workloadIdentityPools/github-actions/providers/github"
          service_account: "ledger-ci@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Run Prisma migrations (Cloud Run Job)
        run: |
          # Create or update the migration job, then execute it and wait
          gcloud run jobs create margot-migrate-dev \
            --image="${{ env.IMAGE }}:${{ needs.build.outputs.image_tag }}" \
            --region="${{ env.REGION }}" \
            --service-account="ledger-app-dev@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --add-cloudsql-instances="${{ env.SQL_CONN_DEV }}" \
            --set-secrets="DATABASE_URL=ledger-database-url-dev:latest" \
            --command="node_modules/.bin/prisma" \
            --args="migrate,deploy" \
            --max-retries=1 \
            --project="${{ env.PROJECT_ID }}" \
            2>/dev/null \
          || \
          gcloud run jobs update margot-migrate-dev \
            --image="${{ env.IMAGE }}:${{ needs.build.outputs.image_tag }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}"

          gcloud run jobs execute margot-migrate-dev \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --wait

      - name: Deploy to Cloud Run (dev)
        run: |
          gcloud run services update "${{ env.CR_SERVICE_DEV }}" \
            --image="${{ env.IMAGE }}:${{ needs.build.outputs.image_tag }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}"

      - name: Smoke test
        run: |
          SERVICE_URL=$(gcloud run services describe "${{ env.CR_SERVICE_DEV }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --format="value(status.url)")
          echo "Smoke-testing $SERVICE_URL"
          curl -sf "$SERVICE_URL/api/healthz" | tee /dev/stderr | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if d.get('status') not in ('ok', 'degraded'):
              sys.exit(1)
          "

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy to prod (manual approval required)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy → prod
    runs-on: ubuntu-latest
    needs: [build, deploy-dev]
    environment: prod # requires manual approval in GitHub UI
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && inputs.environment == 'prod'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/$(gcloud projects describe ${{ env.PROJECT_ID }} --format='value(projectNumber)')/locations/global/workloadIdentityPools/github-actions/providers/github"
          service_account: "ledger-ci@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Run Prisma migrations (Cloud Run Job — prod)
        run: |
          gcloud run jobs create margot-migrate-prod \
            --image="${{ env.IMAGE }}:${{ needs.build.outputs.image_tag }}" \
            --region="${{ env.REGION }}" \
            --service-account="ledger-app-prod@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --add-cloudsql-instances="${{ env.SQL_CONN_PROD }}" \
            --set-secrets="DATABASE_URL=ledger-database-url-prod:latest" \
            --command="node_modules/.bin/prisma" \
            --args="migrate,deploy" \
            --max-retries=1 \
            --project="${{ env.PROJECT_ID }}" \
            2>/dev/null \
          || \
          gcloud run jobs update margot-migrate-prod \
            --image="${{ env.IMAGE }}:${{ needs.build.outputs.image_tag }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}"

          gcloud run jobs execute margot-migrate-prod \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --wait

      - name: Deploy to Cloud Run (prod)
        run: |
          gcloud run services update "${{ env.CR_SERVICE_PROD }}" \
            --image="${{ env.IMAGE }}:${{ needs.build.outputs.image_tag }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}"

      - name: Smoke test (prod)
        run: |
          SERVICE_URL=$(gcloud run services describe "${{ env.CR_SERVICE_PROD }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --format="value(status.url)")
          echo "Smoke-testing $SERVICE_URL"
          curl -sf "$SERVICE_URL/api/healthz" | tee /dev/stderr | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if d.get('status') not in ('ok', 'degraded'):
              sys.exit(1)
          "
