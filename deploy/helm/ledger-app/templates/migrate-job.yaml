# Runs prisma db push (and optionally seed) before every install/upgrade.
# Using native sidecar (K8s 1.29+) so the proxy terminates when the job completes.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ledger-app.fullname" . }}-migrate-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ledger-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrate.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "ledger-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      serviceAccountName: {{ include "ledger-app.serviceAccountName" . }}
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001

      # Native sidecar (K8s 1.29+): proxy stays up until job container exits
      initContainers:
        - name: cloud-sql-proxy
          image: {{ .Values.cloudSql.proxyImage }}
          restartPolicy: Always  # native sidecar flag
          args:
            - "--private-ip"
            - "--port=5432"
            - {{ include "ledger-app.sqlConnectionName" . | quote }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
          resources:
            {{- toYaml .Values.cloudSql.resources | nindent 12 }}

      containers:
        - name: migrate
          image: {{ include "ledger-app.image" . }}
          command:
            - sh
            - -c
            - |
              set -e
              echo "▶ Fetching DATABASE_URL from Secret Manager..."
              TOKEN=$(wget -qO- --header "Metadata-Flavor: Google" \
                "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" | \
                node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d).access_token))")
              DATABASE_URL=$(wget -qO- \
                --header "Authorization: Bearer $TOKEN" \
                "https://secretmanager.googleapis.com/v1/projects/${GCP_PROJECT}/secrets/${DB_SECRET_NAME}/versions/latest:access" | \
                node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{ const j=JSON.parse(d); console.log(Buffer.from(j.payload.data,'base64').toString()); })")
              echo "▶ Waiting for SQL proxy..."
              until nc -z localhost 5432; do sleep 1; done
              echo "▶ Running prisma db push..."
              node_modules/.bin/prisma db push --url "$DATABASE_URL"
              echo "✓ Migration complete."
          env:
            - name: SEED_ENABLED
              value: {{ .Values.seed.enabled | quote }}
            - name: GCP_PROJECT
              value: {{ .Values.externalSecret.projectId | default "codelab303-ledger" | quote }}
            - name: DB_SECRET_NAME
              value: ledger-database-url-{{ .Values.externalSecret.envSuffix }}
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
