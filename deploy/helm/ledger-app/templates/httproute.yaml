apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "ledger-app.fullname" . }}-https
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ledger-app.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "ledger-app.fullname" . }}-gateway
      sectionName: https
  hostnames:
    - {{ required "gateway.hostname is required" .Values.gateway.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "ledger-app.fullname" . }}
          port: {{ .Values.service.port }}
---
# HTTP → HTTPS redirect
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "ledger-app.fullname" . }}-http-redirect
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ledger-app.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "ledger-app.fullname" . }}-gateway
      sectionName: http
  hostnames:
    - {{ .Values.gateway.hostname | quote }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
