apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "ledger-app.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ledger-app.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: gcp-secretmanager
    kind: ClusterSecretStore
  target:
    name: ledger-app-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: ledger-database-url-{{ .Values.externalSecret.envSuffix }}
    - secretKey: NEXTAUTH_SECRET
      remoteRef:
        key: ledger-nextauth-secret-{{ .Values.externalSecret.envSuffix }}
    - secretKey: NEXTAUTH_URL
      remoteRef:
        key: ledger-nextauth-url-{{ .Values.externalSecret.envSuffix }}
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: ledger-anthropic-api-key-{{ .Values.externalSecret.envSuffix }}
    - secretKey: CRON_SECRET
      remoteRef:
        key: ledger-cron-secret-{{ .Values.externalSecret.envSuffix }}
