apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ledger-app.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "ledger-app.labels" . | nindent 4 }}
  annotations:
    # Workload Identity: binds this KSA to the GCP service account
    iam.gke.io/gcp-service-account: {{ required "serviceAccount.gcpServiceAccountEmail is required" .Values.serviceAccount.gcpServiceAccountEmail }}
