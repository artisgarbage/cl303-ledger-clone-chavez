apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gcp-secretmanager
  # ClusterSecretStore is cluster-scoped; created once, shared by all namespaces.
  # Install External Secrets Operator before applying this chart:
  #   helm repo add external-secrets https://charts.external-secrets.io
  #   helm upgrade --install external-secrets external-secrets/external-secrets \
  #     -n external-secrets --create-namespace
spec:
  provider:
    gcpsm:
      projectID: codelab303-ledger
      auth:
        workloadIdentity:
          clusterLocation: us-central1
          clusterName: ledger-cluster-{{ .Values.externalSecret.envSuffix }}
          clusterProjectID: codelab303-ledger
          serviceAccountRef:
            name: {{ include "ledger-app.serviceAccountName" . }}
            namespace: {{ .Release.Namespace }}
